# ============================================================
#  CLYVO VET — Docker Compose
#  Servicos: Oracle DB + API Java Spring Boot
#  Variaveis sensiveis no arquivo .env
# ============================================================

services:

  # --------------------------------------------------------
  #  BANCO DE DADOS ORACLE
  # --------------------------------------------------------
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-clyvovet
    environment:
      - ORACLE_PASSWORD=${ORACLE_PASSWORD}
      - APP_USER=${APP_USER}
      - APP_USER_PASSWORD=${APP_USER_PASSWORD}
      - ORACLE_DATABASE=${ORACLE_DATABASE}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - clyvovet-network
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # --------------------------------------------------------
  #  API JAVA SPRING BOOT
  # --------------------------------------------------------
  api-java:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-clyvovet
    environment:
      - PORT=${PORT:8080}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}
      - SPRING_JPA_DATABASE_PLATFORM=${SPRING_JPA_DATABASE_PLATFORM}
      - APP_JWT_SECRET=${APP_JWT_SECRET}
    ports:
      - "8080:8080"
    networks:
      - clyvovet-network
    mem_limit: 1g
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: unless-stopped

# --------------------------------------------------------
#  VOLUME NOMEADO (persistencia dos dados do Oracle)
# --------------------------------------------------------
volumes:
  oracle-data:

# --------------------------------------------------------
#  REDE DOCKER
# --------------------------------------------------------
networks:
  clyvovet-network:
