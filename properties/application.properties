# ============================================================
#  CLYVO VET — Configuracao Spring Boot
#  Valores sobrescritos por variaveis de ambiente no Docker
# ============================================================

spring.application.name=clyvo-vet
server.port=${PORT:8080}

# --- Conexao Oracle ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/PETFLOWDB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:petflow}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:PetFlow2026}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# --- JWT ---
app.jwt.secret=${APP_JWT_SECRET:clyvovet-2026-fiap-secret-key-change-in-production!!}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000
